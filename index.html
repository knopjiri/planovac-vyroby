<!doctype html>
<html lang="cs">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>TIMSEAL – Plánovač výroby cloud</title>
  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
  <style>
    :root{
      --brand-orange:#d26e1e;
      --brand-orange-dark:#b85f18;
      --brand-blue:#1b254f;
      --brand-blue-2:#243161;
      --bg:#eef2f7;
      --card:#ffffff;
      --line:#d8e0eb;
      --text:#172033;
      --muted:#5f6f86;
      --green:#e8f7ee;
      --green-b:#92d4aa;
      --red:#fdeaea;
      --red-b:#efb1b1;
      --blue:#e8eefb;
      --amber:#fff1d6;
      --amber-b:#efc36b;
      --shadow:0 10px 30px rgba(27,37,79,.08);
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:Inter,Segoe UI,Arial,sans-serif;
      background:linear-gradient(180deg,#f4f7fb 0%, #eef2f7 100%);
      color:var(--text)
    }
    .topbar{
      position:sticky;
      top:0;
      z-index:1000;
      background:linear-gradient(135deg,var(--brand-blue) 0%, var(--brand-blue-2) 100%);
      color:#fff;
      border-bottom:4px solid var(--brand-orange);
      box-shadow:0 8px 24px rgba(27,37,79,.18);
    }
    .topbar-inner{
      max-width:1600px;
      margin:0 auto;
      padding:18px 24px;
      display:flex;
      align-items:center;
      gap:18px;
      justify-content:space-between;
      flex-wrap:wrap;
    }
    .brand{
      display:flex;
      align-items:center;
      gap:16px;
      min-width:0;
    }
    .brand-mark{
      width:64px;
      height:64px;
      border-radius:14px;
      background:linear-gradient(135deg,var(--brand-orange) 0%, #ec8b32 100%);
      display:flex;
      align-items:center;
      justify-content:center;
      color:#fff;
      font-weight:800;
      letter-spacing:.08em;
      box-shadow:inset 0 1px 0 rgba(255,255,255,.25);
      flex:0 0 auto;
    }
    .brand-text{min-width:0}
    .brand-title{
      font-size:30px;
      line-height:1;
      font-weight:900;
      letter-spacing:.04em;
      margin:0 0 6px;
    }
    .brand-subtitle{
      display:inline-block;
      padding:4px 10px;
      background:#fff;
      color:var(--brand-blue);
      border-radius:999px;
      font-size:12px;
      font-weight:700;
      letter-spacing:.08em;
      text-transform:uppercase;
    }

    .cloud-status{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:6px 10px;
      border-radius:999px;
      background:rgba(255,255,255,.14);
      color:#fff;
      font-size:12px;
      font-weight:700;
      max-width:340px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .topbar-note{
      font-size:13px;
      color:rgba(255,255,255,.82);
      text-align:right;
      max-width:420px;
      line-height:1.4;
    }
    .app{
      max-width:1600px;
      margin:0 auto;
      padding:24px;
      display:grid;
      grid-template-columns:390px 1fr;
      gap:24px;
      align-items:start
    }
    .content-sticky{
      position:sticky;
      top:104px;
      z-index:950;
    }
    .sidebar{
      position:sticky;
      top:104px;
      display:flex;
      flex-direction:column;
      gap:16px;
      height:calc(100vh - 120px);
      min-height:0;
      overflow-y:auto;
      overflow-x:hidden;
      padding-right:8px;
      scrollbar-width:thin;
      align-self:start;
    }
    .sidebar::-webkit-scrollbar{width:10px}
    .sidebar::-webkit-scrollbar-thumb{background:#c7d2e5;border-radius:999px}
    .sidebar::-webkit-scrollbar-track{background:transparent}
    .sidebar .card{flex:0 0 auto}
    .sidebar .card:last-child{min-height:0}
    .card{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:18px;
      box-shadow:var(--shadow);
      overflow:hidden;
    }
    .card h2{
      margin:0;
      font-size:18px;
      font-weight:800;
      color:var(--brand-blue);
    }
    .header{
      padding:16px 18px 10px;
      background:linear-gradient(180deg,#ffffff 0%, #f9fbfe 100%);
      border-bottom:1px solid #edf1f7;
    }
    .body{padding:16px 18px 18px}
    .stack{display:flex;flex-direction:column;gap:10px}
    .row{display:flex;gap:8px;align-items:center}
    .row.wrap{flex-wrap:wrap}
    input, select, button{
      font:inherit;
      border:1px solid var(--line);
      border-radius:12px;
      padding:10px 12px;
      background:#fff;
      color:var(--text);
      transition:.15s ease;
    }
    input:focus, select:focus{
      outline:none;
      border-color:#9cb0d4;
      box-shadow:0 0 0 3px rgba(210,110,30,.12);
    }
    input[type=file]{padding:8px}
    button{
      cursor:pointer;
      font-weight:700;
    }
    button:hover{
      background:#f8fafc;
      border-color:#c6d3e5;
    }
    .btn-sm{padding:6px 10px;font-size:12px}
    .toolbar button,
    .primary-btn{
      background:var(--brand-orange);
      color:#fff;
      border-color:var(--brand-orange);
    }
    .toolbar button:hover,
    .primary-btn:hover{
      background:var(--brand-orange-dark);
      border-color:var(--brand-orange-dark);
    }
    .toolbar .secondary{
      background:#fff;
      color:var(--brand-blue);
      border-color:#c9d5e8;
    }
    .toolbar .secondary:hover{
      background:#f7faff;
      border-color:#aebfdd;
    }
    .muted{color:var(--muted);font-size:12px;line-height:1.45}
    .list{display:flex;flex-direction:column;gap:10px}
    .group,.op,.planned-op{
      border:1px solid var(--line);
      border-radius:14px;
      padding:12px;
      background:#fff
    }
    .group{
      border-left:4px solid var(--brand-orange);
      background:linear-gradient(180deg,#fff 0%, #fcfdff 100%);
    }
    .group-head,.op-head,.planned-head{
      display:flex;justify-content:space-between;align-items:flex-start;gap:8px
    }
    .title{font-weight:700;font-size:14px}
    .sub{font-size:12px;color:var(--muted);margin-top:4px;line-height:1.35}
    .badge{
      display:inline-block;
      padding:3px 8px;
      border-radius:999px;
      border:1px solid #d8e0eb;
      font-size:11px;
      background:#f8fafc;
      color:var(--brand-blue);
      font-weight:700;
    }
    .badge.planned{
      background:var(--green);
      border-color:var(--green-b);
      color:#17603a
    }
    .group-ops{display:flex;flex-direction:column;gap:8px;margin-top:10px}
    .op{background:#f9fbfe}
    .op.planned{background:var(--green);border-color:var(--green-b);opacity:.82}
    .op.done{
      background:#f9e3d1;
      border-color:#e8b892;
    }
    .main{display:flex;flex-direction:column;gap:16px}
    .toolbar{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      background:#fff;
      border:1px solid var(--line);
      border-radius:18px;
      padding:12px;
      box-shadow:var(--shadow);
    }
    .machine-card .header{
      padding-bottom:12px;
      background:linear-gradient(135deg,var(--brand-blue) 0%, var(--brand-blue-2) 100%);
    }
    .machine-card .header h2{color:#fff}
    .machine-grid{
      display:grid;
      grid-template-columns:repeat(5,minmax(180px,1fr));
      gap:12px;
      padding:16px;
    }
    .day{
      border:1px solid var(--line);
      border-radius:14px;
      background:#f7f9fc;
      padding:10px;
      min-height:240px;
      transition:.15s ease;
    }
    .day.drop-ok{
      outline:2px solid #6ea0ff;
      background:#eff5ff;
      box-shadow:0 0 0 4px rgba(110,160,255,.12)
    }
    .preview-ghost{
      border:2px dashed var(--brand-orange);
      background:rgba(210,110,30,.08);
      border-radius:12px;
      padding:8px;
      margin-top:8px;
      font-size:12px;
      color:var(--brand-blue);
      font-weight:700;
    }
    .planned-op.dragging{
      opacity:.45;
      outline:2px dashed var(--brand-orange);
    }
    .planned-op.over-before{
      box-shadow: inset 0 4px 0 var(--brand-orange);
    }
    .planned-op.over-after{
      box-shadow: inset 0 -4px 0 var(--brand-orange);
    }
    .op-main-vzk{
      font-size:16px;
      font-weight:900;
      color:var(--brand-blue);
      line-height:1.15;
    }
    .op-main-part{
      font-size:15px;
      font-weight:800;
      line-height:1.2;
      margin-top:2px;
    }
    .op-main-operation{
      font-size:14px;
      font-weight:700;
      margin-top:4px;
    }
    .op-main-hours{
      font-size:14px;
      font-weight:800;
      color:var(--brand-orange-dark);
      margin-top:2px;
    }
    .day-head{display:flex;justify-content:space-between;align-items:flex-start;gap:6px}
    .day-title{font-size:12px;font-weight:800;color:var(--brand-blue)}
    .progress{
      height:8px;background:#dbe4f0;border-radius:999px;overflow:hidden;margin:8px 0 6px
    }
    .bar{
      height:100%;
      background:linear-gradient(90deg,var(--brand-orange) 0%, #ec8b32 100%)
    }
    .planned-op{padding:8px;margin-top:8px}
    .planned-op.green{background:var(--green);border-color:var(--green-b)}
    .planned-op.red{background:var(--red);border-color:var(--red-b)}
    .planned-op .actions{display:flex;gap:6px}
    .tiny{font-size:11px;color:var(--muted)}
    .warn{font-size:11px;color:#92400e;margin-top:4px;font-weight:700}
    .hidden{display:none !important}
    .empty{font-size:13px;color:var(--muted);padding:4px 0}
    @media (max-width: 1200px){
      .topbar-inner{align-items:flex-start;flex-direction:column}
      .app{grid-template-columns:1fr}
      .sidebar{position:static;max-height:none}
    }
    @media (max-width: 900px){
      .machine-grid{grid-template-columns:1fr}
      .brand-title{font-size:24px}
      .brand-mark{width:52px;height:52px}
    }
  </style>
</head>
<body>
<div class="topbar">
  <div class="topbar-inner">
    <div class="brand">
      <img src="timeseal_logo.png" alt="Timeseal logo" style="height:64px;max-width:min(680px,70vw);object-fit:contain;">
    </div>
    <div class="row wrap" style="margin-left:auto; gap:12px;">
      <button id="importButtonHeader" class="primary-btn" type="button">Import z QI</button>
      <span id="importFileNameHeader" style="font-size:12px;color:rgba(255,255,255,.85);max-width:260px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">Není vybraný soubor</span>
      <input id="fileInputHeader" type="file" accept=".xlsx,.xls" style="position:absolute;left:-9999px;width:1px;height:1px;opacity:0;" />
    </div>
    </div>
    <div class="cloud-status" id="cloudStatus">Cloud: připojování…</div><div class="topbar-note">Interní plánovač výroby</div>
  </div>
</div>
<div class="app">
  <aside class="sidebar">


    <section class="card">
      <div class="header"><h2>Fronta zakázek a operací</h2></div>
      <div class="body stack" style="min-height:0;">
        <input id="searchInput" placeholder="Hledat podle VZK nebo názvu dílce" />
        <select id="sortBy">
          <option value="default">Řazení: výchozí</option>
          <option value="vzk-asc">Řazení: VZK vzestupně</option>
          <option value="vzk-desc">Řazení: VZK sestupně</option>
        </select>
        <select id="machineFilter"></select>
        <div class="muted">Konkrétní stroj se určí až přetažením do kalendáře. Ve frontě se ukazuje jen typ nebo možné zařazení.</div>
        <div id="backlogList" class="list" style="max-height:60vh; min-height:240px; overflow-y:auto; overflow-x:hidden; padding-right:6px; scrollbar-width:thin;"></div>
      </div>
    </section>
  </aside>

  <main class="main">
    <div class="toolbar content-sticky">
      <button id="prevWeek">← Předchozí týden</button>
      <button id="nextWeek">Další týden →</button>
      <button id="todayWeek" class="secondary">Aktuální týden</button>
      <button id="resetData" class="secondary">Reset uložených dat</button>
    </div>
    <div id="machinesWrap"></div>
  </main>
</div>

<script>
const WORKDAY_HOURS = 8;
const BREAK_HOURS = 0.5;
const AVAILABLE_HOURS = WORKDAY_HOURS - BREAK_HOURS;
const STORAGE_KEY = "planovac-vyroby-html-v2";

const MACHINES = [
  { name: "NLX3000", shifts: 2 },
  { name: "NLX2500", shifts: 2 },
  { name: "NLX700", shifts: 1 },
  { name: "ST35", shifts: 1 },
  { name: "SN50", shifts: 2 },
  { name: "VF3", shifts: 1 },
  { name: "DMU75", shifts: 1 },
];


const CLOUD_API_URL = "https://script.google.com/macros/s/AKfycbwJvPjbCrTGOHjPD6EWo5gwJyTRFqpcxDx35Ad-gloELMa_WwLBMkVzUZwSlonACWrL/exec";
let cloudHydrating = true;
let cloudReady = false;
let cloudSaveTimer = null;
let cloudLastLoadedHash = "";
let cloudSaveInFlight = false;

function updateCloudStatus(text){
  const el = document.getElementById("cloudStatus");
  if(el) el.textContent = text;
}
function safeHash(obj){
  try { return JSON.stringify(obj); } catch (_) { return ""; }
}
async function cloudLoadState(){
  const res = await fetch(`${CLOUD_API_URL}?action=load`, { method: "GET" });
  const data = await res.json();
  if(!data.ok){
    throw new Error(data.error || "Cloud load failed");
  }
  return data.state;
}
async function cloudSaveState(stateToSave){
  const payload = {
    state: stateToSave,
    meta: { source: "web", user: "" }
  };
  const res = await fetch(CLOUD_API_URL, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(payload)
  });
  const data = await res.json();
  if(!data.ok){
    throw new Error(data.error || "Cloud save failed");
  }
  return data;
}
function scheduleCloudSave(){
  if(cloudHydrating || !cloudReady) return;
  clearTimeout(cloudSaveTimer);
  cloudSaveTimer = setTimeout(async () => {
    if(cloudSaveInFlight) return;
    cloudSaveInFlight = true;
    updateCloudStatus("Cloud: ukládám…");
    try{
      const snapshot = {
        weekStart: toDateKey(state.weekStart),
        backlog: state.backlog,
        schedule: state.schedule,
        expandedGroups: state.expandedGroups,
        machineFilter: state.machineFilter,
        searchTerm: state.searchTerm,
        sortBy: state.sortBy,
        daySettings: state.daySettings,
      };
      await cloudSaveState(snapshot);
      cloudLastLoadedHash = safeHash(snapshot);
      updateCloudStatus("Cloud: uloženo");
    }catch(err){
      console.error(err);
      updateCloudStatus("Cloud: chyba ukládání");
    }finally{
      cloudSaveInFlight = false;
    }
  }, 900);
}
async function initCloud(){
  updateCloudStatus("Cloud: načítám…");
  try{
    const remoteState = await cloudLoadState();
    if(remoteState){
      if(remoteState.weekStart) state.weekStart = startOfWeek(parseDateKey(remoteState.weekStart));
      if(Array.isArray(remoteState.backlog)) state.backlog = remoteState.backlog;
      if(remoteState.schedule && typeof remoteState.schedule === "object") state.schedule = remoteState.schedule;
      if(remoteState.expandedGroups && typeof remoteState.expandedGroups === "object") state.expandedGroups = remoteState.expandedGroups;
      if(typeof remoteState.machineFilter === "string") state.machineFilter = remoteState.machineFilter;
      if(typeof remoteState.searchTerm === "string") state.searchTerm = remoteState.searchTerm;
      if(typeof remoteState.sortBy === "string") state.sortBy = remoteState.sortBy;
      if(remoteState.daySettings && typeof remoteState.daySettings === "object") state.daySettings = remoteState.daySettings;
      cloudLastLoadedHash = safeHash(remoteState);
      updateCloudStatus("Cloud: načteno");
    }else{
      updateCloudStatus("Cloud: prázdný stav");
    }
    cloudReady = true;
    cloudHydrating = false;
    render();
  }catch(err){
    console.error(err);
    cloudReady = true;
    cloudHydrating = false;
    updateCloudStatus("Cloud: offline, lokální data");
    render();
  }
}

let state = {
  weekStart: startOfWeek(new Date()),
  backlog: [],
  schedule: {},
  expandedGroups: {},
  searchTerm: "",
  machineFilter: "vše",
  sortBy: "default",
  daySettings: {},
};

function pad(n){ return String(n).padStart(2,"0"); }
function toDateKey(d){ return d.getFullYear() + "-" + pad(d.getMonth()+1) + "-" + pad(d.getDate()); }
function parseDateKey(s){ const [y,m,d]=s.split("-").map(Number); return new Date(y,m-1,d,12,0,0,0); }
function startOfWeek(date){
  const d = new Date(date);
  const day = d.getDay();
  const diff = day === 0 ? -6 : 1 - day;
  d.setDate(d.getDate()+diff); d.setHours(0,0,0,0);
  return d;
}
function addDays(date, days){ const d=new Date(date); d.setDate(d.getDate()+days); return d; }
function isWeekend(date){ const x=date.getDay(); return x===0 || x===6; }
function nextWorkday(date){ let d=addDays(date,1); while(isWeekend(d)) d=addDays(d,1); return d; }
function formatDate(date){
  return new Intl.DateTimeFormat("cs-CZ",{weekday:"short",day:"numeric",month:"numeric"}).format(date);
}
function getWeekLabel(dateStr){
  const monday = startOfWeek(parseDateKey(dateStr));
  const friday = addDays(monday,4);
  const fmt = new Intl.DateTimeFormat("cs-CZ",{day:"numeric",month:"numeric"});
  return `${fmt.format(monday)} - ${fmt.format(friday)}`;
}
function machineCapacity(machineName){
  const m = MACHINES.find(x=>x.name===machineName); return (m?.shifts || 1) * AVAILABLE_HOURS;
}
function daySettingKey(dayKey, machineName){
  return `${dayKey}_${machineName}`;
}
function getDaySetting(dayKey, machineName){
  return state.daySettings[daySettingKey(dayKey, machineName)] || {};
}
function getDayCapacity(machineName, dayKey){
  const setting = getDaySetting(dayKey, machineName);
  if (setting.isOff) return 0;
  if (setting.capacityOverride !== undefined && setting.capacityOverride !== null && setting.capacityOverride !== "") {
    return Math.max(0, Number(setting.capacityOverride) || 0);
  }
  return machineCapacity(machineName);
}
function setDayCapacity(machineName, dayKey, value){
  const key = daySettingKey(dayKey, machineName);
  const current = state.daySettings[key] || {};
  state.daySettings[key] = { ...current, capacityOverride: value };
  rebuildMachineTimeline(machineName);
  saveState();
  render();
}
function setDayOff(machineName, dayKey, isOff){
  const key = daySettingKey(dayKey, machineName);
  const current = state.daySettings[key] || {};
  state.daySettings[key] = { ...current, isOff: !!isOff };
  rebuildMachineTimeline(machineName);
  saveState();
  render();
}
function detectMachineOptionsFromTechnology(technologyId){
  const text = String(technologyId || "").toUpperCase().trim();

  const cncLathes = ["NLX3000","NLX2500","NLX700","ST35"];
  const mills = ["VF3","DMU75"];

  if (text === "SOUSTRUZENI SCNC 35") return cncLathes;
  if (text === "SOUSTRUZENI NLX 3000 MORI") return cncLathes;
  if (text === "SOUSTRUZENI NLX 2500 MORI") return cncLathes;
  if (text === "SOUSTRUZENI NLX 1250 MORI") return cncLathes;

  if (text === "SOUSTRUZENI SK 50") return ["SN50", ...cncLathes];

  if (text === "FREZOVANI CNC 4") return mills;
  if (text === "FREZOVANI CNC 3") return mills;
  if (text === "FREZOVANI DMU 75") return mills;

  return [];
}

function detectMachineOptionsFromOperation(op){
  const text = String(op || "").toUpperCase().trim();

  if (/\bSN\s*50\b/.test(text) || text === "SN50") return ["SN50"];
  if (text.includes("SCNC") || text.includes("SOUSTRU")) return ["NLX3000","NLX2500","NLX700","ST35"];
  if (text.includes("FREZ") || text.includes("FCNC")) return ["VF3","DMU75"];

  return [];
}
function deriveMachineOptions(taskLike){
  const technologyId = String(taskLike?.technologyId || "").trim();
  const operationType = String(taskLike?.operationType || "").trim();
  const name = String(taskLike?.name || "").trim();
  const fromTechnology = detectMachineOptionsFromTechnology(technologyId);
  if (fromTechnology.length) return fromTechnology;
  const fromOperation = detectMachineOptionsFromOperation(`${operationType} ${name}`.trim() || name);
  return fromOperation;
}
function machineTypeLabel(machineOptions){
  if (!machineOptions || machineOptions.length===0) return "Bez stroje";
  if (machineOptions.length===1) return machineOptions[0];
  const turning = ["NLX3000","NLX2500","NLX700","ST35","SN50"];
  const milling = ["VF3","DMU75"];
  const isTurning = machineOptions.every(m=>turning.includes(m));
  const isMilling = machineOptions.every(m=>milling.includes(m));
  if (isTurning) return machineOptions.includes("SN50") ? "Soustruh / SN50" : "CNC soustruh";
  if (isMilling) return "Frézka";
  return machineOptions.join(", ");
}
function extractPartName(task){
  if (task.partName && String(task.partName).trim()) return String(task.partName).trim();
  const group = String(task.groupName || "").trim();
  if (group.includes("|")) {
    const parts = group.split("|").map(x => x.trim()).filter(Boolean);
    if (parts.length >= 2) return parts.slice(1).join(" | ");
  }
  return "";
}
function normalizeGroupName(task){
  return `VZK ${task.vzk || ""}`.trim();
}
function makeOperationKey(task){
  return [
    String(task.vzk || "").trim(),
    extractPartName(task),
    String(task.name || "").trim(),
    Number(task.totalHours ?? task.hours ?? 0)
  ].join("|");
}
function makeOperationFingerprint(task){
  return String(task.operationKey || makeOperationKey(task));
}
function groupImportedTasks(tasks){
  const groups = {};
  tasks.forEach(task=>{
    const key = String(task.vzk || `no-vzk-${task.id}`);
    if(!groups[key]){
      groups[key] = {

function rebuildMachineTimeline(machine, preferredOrder=null){
  const machineEntries = Object.entries(state.schedule)
    .filter(([key]) => key.endsWith(`_${machine}`))
    .sort((a,b) => a[0].localeCompare(b[0]));
  const allTasks = machineEntries.flatMap(([,tasks]) => tasks || []);
  if(!allTasks.length) return;

  const naturalOrder = [];
  machineEntries.forEach(([,tasks])=>{
    (tasks || []).forEach(task=>{
      const opKey = makeOperationFingerprint(task);
      if(!naturalOrder.includes(opKey)) naturalOrder.push(opKey);
    });
  });
  const orderedOpKeys = preferredOrder && preferredOrder.length
    ? preferredOrder.filter(opKey => naturalOrder.includes(opKey))
    : naturalOrder;

  const metaMap = new Map();
  naturalOrder.forEach(opKey=>{
    const parts = allTasks.filter(t => makeOperationFingerprint(t) === opKey);
    if(parts.length){
      metaMap.set(opKey, {
        ...parts[0],
        totalHours: Number(parts[0].totalHours ?? parts.reduce((s,t)=>s + Number(t.hours || 0), 0)),
        operationKey: opKey,
      });
    }
  });

  const scheduleFirstDay = machineEntries.length ? machineEntries[0][0].split("_")[0] : null;
  const settingDays = Object.keys(state.daySettings || {})
    .filter(k => k.endsWith(`_${machine}`))
    .map(k => k.split("_")[0])
    .sort();
  const firstDay = [scheduleFirstDay, settingDays[0]].filter(Boolean).sort()[0] || null;

  const nextSchedule = {};
  Object.entries(state.schedule).forEach(([key, tasks])=>{
    if(!key.endsWith(`_${machine}`)) nextSchedule[key] = tasks;
  });
  state.schedule = nextSchedule;

  if(!firstDay) return;
  let currentDay = parseDateKey(firstDay);

  for(const opKey of orderedOpKeys){
    const meta = metaMap.get(opKey);
    if(!meta) continue;
    let remaining = Number(meta.totalHours || 0);
    let day = currentDay;
    let firstPlacedDay = null;

    while(remaining > 0){
      const dayKey = toDateKey(day);
      const key = `${dayKey}_${machine}`;
      const laneTasks = [...(state.schedule[key] || [])];
      const capacity = getDayCapacity(machine, dayKey);
      const used = laneTasks.reduce((s,t)=>s + Number(t.hours || 0), 0);
      const free = Math.max(capacity - used, 0);

      if(free > 0){
        const planned = Math.min(free, remaining);
        laneTasks.push({
          ...meta,
          id: crypto.randomUUID ? crypto.randomUUID() : (Date.now()+"-"+Math.random()),
          machine: machine,
          plannedDay: dayKey,
          hours: Number(planned.toFixed(2)),
          totalHours: Number(meta.totalHours),
          operationKey: opKey,
        });
        state.schedule[key] = laneTasks;
        remaining = Number((remaining - planned).toFixed(2));
        if(!firstPlacedDay) firstPlacedDay = dayKey;
      }
      if(remaining > 0) day = nextWorkday(day);
    }

    if(firstPlacedDay){
      currentDay = parseDateKey(firstPlacedDay);
    }
  }
}

        id: crypto.randomUUID ? crypto.randomUUID() : (Date.now()+"-"+Math.random()),
        machine: targetMachine,
        hours: Number(planned.toFixed(2)),
        totalHours: originalTotal,
        operationKey: opKey,
        plannedDay: toDateKey(day),
      });
      state.schedule[key] = tasks;
      remaining = Number((remaining - planned).toFixed(2));
    }
    if(remaining > 0) day = nextWorkday(day);
  }

  state.backlog = state.backlog.map(item=>{
    if(item.type!=="group" || item.id!==task.groupId) return item;
    return {...item, operations:item.operations.filter(op=>op.id!==task.id)};
  }).filter(item=>item.type!=="group" || item.operations.length>0);

  rebuildMachineTimeline(targetMachine);

  saveState(); render();
}
function returnScheduledTaskToBacklog(taskToReturn){
  const opKey = makeOperationFingerprint(taskToReturn);
  const totalHours = Number(taskToReturn.totalHours ?? taskToReturn.hours ?? 0);
  const firstDay = String(taskToReturn.plannedDay || "");
  const machine = String(taskToReturn.machine || "");

  const newSchedule = {};
  Object.entries(state.schedule).forEach(([key, tasks])=>{
    const filtered = tasks.filter(task=>makeOperationFingerprint(task)!==opKey);
    if(filtered.length) newSchedule[key] = filtered;
  });
  state.schedule = newSchedule;

  const groupId = `group-${taskToReturn.vzk}`;
  const restoredOperation = {
    id: crypto.randomUUID ? crypto.randomUUID() : (Date.now()+"-"+Math.random()),
    type:"operation",
    vzk:taskToReturn.vzk,
    partName:extractPartName(taskToReturn),
    groupName:normalizeGroupName(taskToReturn),
    name:taskToReturn.name,
    hours:totalHours,
    totalHours:totalHours,
    priority:taskToReturn.priority || "Střední",
    due:taskToReturn.due || "",
    machineOptions:taskToReturn.machineOptions || [],
    operationKey: opKey,
  };
  const idx = state.backlog.findIndex(item=>item.type==="group" && String(item.vzk)===String(taskToReturn.vzk));
  if(idx === -1){
    state.backlog.unshift({
      id:groupId, type:"group", vzk:String(taskToReturn.vzk), name:normalizeGroupName(taskToReturn),
      priority:"Střední", due:"", operations:[restoredOperation]
    });
  }else{
    const alreadyExists = state.backlog[idx].operations.some(op=>makeOperationFingerprint(op)===opKey);
    if(!alreadyExists) state.backlog[idx].operations.unshift(restoredOperation);
  }
  state.expandedGroups[groupId] = true;

  if (machine && firstDay) compactMachineFromDay(machine, firstDay);

  saveState(); render();
}
function renderMachineFilter(){
  const select = document.getElementById("machineFilter");
  select.innerHTML = `<option value="vše">Všechny stroje</option>` + MACHINES.map(m=>`<option value="${m.name}">${m.name}</option>`).join("");
  select.value = state.machineFilter;
}
function renderBacklog(){
  const wrap = document.getElementById("backlogList");
  const filtered = getFilteredBacklog();
  const plannedSet = getScheduledOperationFingerprints();
  if(filtered.length===0){
    wrap.innerHTML = `<div class="empty">Nic neodpovídá filtru. Překvapivě i strojní výroba má své tiché momenty.</div>`;
    return;
  }
  wrap.innerHTML = "";
  filtered.forEach(task=>{
    if(task.type==="group"){
      const totalHours = task.operations.reduce((s,op)=>s + Number(op.totalHours ?? op.hours ?? 0),0);
      const isExpanded = !!state.expandedGroups[task.id];
      const group = document.createElement("div");
      group.className = "group";
      group.innerHTML = `
        <div class="group-head">
          <div>
            <div class="title">${escapeHtml(task.name)}</div>
            <div class="sub">${task.operations.length} operací • ${totalHours.toFixed(2)} h celkem</div>
          </div>
          <div class="row">
            <button class="btn-sm toggle-btn secondary">${isExpanded ? "Skrýt" : "Rozbalit"}</button>
            <button class="btn-sm del-group secondary">Smazat</button>
          </div>
        </div>
        <div class="group-ops ${isExpanded ? "" : "hidden"}"></div>
      `;
      group.querySelector(".toggle-btn").onclick = ()=>toggleGroup(task.id);
      group.querySelector(".del-group").onclick = ()=>deleteBacklogGroup(task.id);
      const opsWrap = group.querySelector(".group-ops");
      task.operations.forEach(op=>{
        const isPlanned = plannedSet.has(makeOperationFingerprint(op));
        const isDone = !!op.isDone;
        const div = document.createElement("div");
        div.className = `op ${isPlanned ? "planned" : ""} ${isDone ? "done" : ""}`;
        div.draggable = !isPlanned && !isDone;
        div.innerHTML = `
          <div class="op-head">
            <div>
              <div class="op-main-vzk">VZK ${escapeHtml(op.vzk || "")}</div>
              <div class="op-main-part">${escapeHtml(op.partName || "Bez názvu dílce")}</div>
              <div class="op-main-operation">${escapeHtml(op.name || "")}</div>
              <div class="op-main-hours">${Number(op.totalHours ?? op.hours ?? 0)} h</div>
              ${op.operationType ? `<div class="sub"><strong>Typ:</strong> ${escapeHtml(op.operationType)}</div>` : ``}
              ${op.technologyId ? `<div class="sub"><strong>Technologie:</strong> ${escapeHtml(op.technologyId)}</div>` : ``}
              <div class="sub"><strong>Možné stroje:</strong> ${escapeHtml((op.machineOptions || []).join(", "))}</div>
              ${isPlanned ? `<span class="badge planned">Naplánováno</span>` : ``}
              ${isDone ? `<span class="badge" style="background:#f9e3d1;border-color:#e8b892;">HOTOVO</span>` : ``}
            </div>
            <div class="actions" style="display:flex;flex-direction:column;gap:6px;">
              ${!isDone ? `<button class="btn-sm done-backlog-btn secondary" data-group-id="${escapeAttr(task.id)}" data-op-id="${escapeAttr(op.id)}">HOTOVO</button>` : ``}
              ${(!isPlanned && !isDone) ? `<button class="btn-sm del-op secondary">Smazat</button>` : ``}
            </div>
          </div>
        `;
        if(!isPlanned && !isDone){
          div.addEventListener("dragstart", e=>{
            e.dataTransfer.setData("application/json", JSON.stringify({...op, groupId:task.id}));
          });
          const delBtn = div.querySelector(".del-op");
          if(delBtn) delBtn.onclick = ()=>deleteOperationFromGroup(task.id, op.id);
        }
        const doneBtn = div.querySelector(".done-backlog-btn");
        if(doneBtn) doneBtn.onclick = ()=>markBacklogOperationDone(task.id, op.id);
        opsWrap.appendChild(div);
      });
      wrap.appendChild(group);
    }
  });
}
function getDropTargetIndex(targetEl, e){
  const rect = targetEl.getBoundingClientRect();
  const halfway = rect.top + rect.height / 2;
  const isBefore = e.clientY < halfway;
  const index = Number(targetEl.dataset.index || 0);
  targetEl.classList.toggle("over-before", isBefore);
  targetEl.classList.toggle("over-after", !isBefore);
  return isBefore ? index : index + 1;
}
function renderMachines(){
  const wrap = document.getElementById("machinesWrap");
  const weekDays = getWeekDays();
  wrap.innerHTML = MACHINES.map(machine=>{
    const daysHtml = weekDays.map(day=>{
      const dayKey = toDateKey(day);
      const key = `${dayKey}_${machine.name}`;
      const tasks = state.schedule[key] || [];
      const used = tasks.reduce((s,t)=>s+Number(t.hours||0),0);
      const capacity = getDayCapacity(machine.name, dayKey);
      const util = Math.min(100, capacity ? used / capacity * 100 : 0);
      const items = tasks.map((t, index)=>{
        const dueStatus = getDueStatus(t.due, dayKey);
        const cls = dueStatus === "before" ? "green" : dueStatus === "after" ? "red" : "";
        return `
          <div class="planned-op ${cls}" draggable="true"
               data-fp="${escapeAttr(makeOperationFingerprint(t))}"
               data-opkey="${escapeAttr(makeOperationFingerprint(t))}"
               data-day="${escapeAttr(dayKey)}"
               data-machine="${escapeAttr(machine.name)}"
               data-index="${index}">
            <div class="planned-head">
              <div>
                <div class="op-main-vzk">VZK ${escapeHtml(t.vzk || "")}</div>
                <div class="op-main-part">${escapeHtml(t.partName || "Bez názvu dílce")}</div>
                <div class="op-main-operation">${escapeHtml(t.name || "")}</div>
                <div class="op-main-hours">${Number(t.hours).toFixed(2)} h</div>
              </div>
              <div class="actions" style="display:flex;flex-direction:column;gap:6px;">
                <button class="btn-sm done-btn secondary" data-fp="${escapeAttr(makeOperationFingerprint(t))}">HOTOVO</button>
                <button class="btn-sm return-btn secondary" data-fp="${escapeAttr(makeOperationFingerprint(t))}">↩</button>
              </div>
            </div>
          </div>
        `;
      }).join("");

      return `
        <div class="day" data-day="${dayKey}" data-machine="${machine.name}">
          <div class="day-head">
            <div class="day-title">${escapeHtml(formatDate(day))}</div>
            <span class="badge">${used.toFixed(1)} / ${capacity} h</span>
          </div>
          <div class="progress"><div class="bar" style="width:${util}%"></div></div>
          <div class="tiny">Kapacita dne: ${capacity} h ${capacity===0 ? "• Volno" : ""}</div>
          <div class="tiny">Změna kapacity přepočítá plán stroje od tohoto dne dopředu.</div>
          <div class="tiny" style="display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin-top:6px;">
            <label style="display:flex;align-items:center;gap:4px;">Kapacita <input type="number" step="0.5" min="0" value="${(getDaySetting(dayKey, machine.name).capacityOverride ?? "")}" data-capacity-day="${dayKey}" data-capacity-machine="${machine.name}" style="width:72px;padding:4px 6px;border-radius:8px;"></label>
            <label style="display:flex;align-items:center;gap:4px;"><input type="checkbox" ${getDaySetting(dayKey, machine.name).isOff ? "checked" : ""} data-off-day="${dayKey}" data-off-machine="${machine.name}"> Volno</label>
          </div>
          <div class="day-items">${items || `<div class="empty">Přetáhni sem operaci.</div>`}${state.dragPreview && state.dragPreview.targetDay===dayKey && state.dragPreview.targetMachine===machine.name ? `<div class="preview-ghost">${state.dragPreview.lines.map(line => `${escapeHtml(formatDate(parseDateKey(line.day)))} • ${escapeHtml(line.machine)} • ${Number(line.hours).toFixed(2)} h`).join("<br>")}</div>` : ``}</div>
        </div>
      `;
    }).join("");

    return `
      <section class="card machine-card">
        <div class="header">
          <h2>${machine.name} • ${machine.shifts} ${machine.shifts===1 ? "směna" : "směny"} • kapacita ${machineCapacity(machine.name)} h/den</h2>
        </div>
        <div class="machine-grid">${daysHtml}</div>
      </section>
    `;
  }).join("");

  wrap.querySelectorAll(".day").forEach(el=>{
    el.addEventListener("dragover", e=>{
      e.preventDefault();
      const backlogTask = readDraggedTask(e);
      const scheduledTask = readDraggedScheduledTask(e);
      const machine = el.dataset.machine;

      if(backlogTask){
        if(backlogTask.machineOptions?.length && !backlogTask.machineOptions.includes(machine)) return;
        el.classList.add("drop-ok");
        setDragPreview({
          targetDay: el.dataset.day,
          targetMachine: machine,
          lines: buildBacklogPlacementPreview(backlogTask, el.dataset.day, machine)
        });
        renderMachines();
      } else if(scheduledTask){
        if(scheduledTask.machineOptions?.length && !scheduledTask.machineOptions.includes(machine)) return;
        el.classList.add("drop-ok");
        setDragPreview({
          targetDay: el.dataset.day,
          targetMachine: machine,
          lines: buildPlacementPreview(scheduledTask.operationKey || scheduledTask.fp, el.dataset.day, machine)
        });
        renderMachines();
      }
    });
    el.addEventListener("dragleave", ()=>{
      el.classList.remove("drop-ok");
    });
    el.addEventListener("drop", e=>{
      e.preventDefault();
      el.classList.remove("drop-ok");
      const machine = el.dataset.machine;
      const backlogTask = readDraggedTask(e);
      const scheduledTask = readDraggedScheduledTask(e);

      if(backlogTask){
        if(backlogTask.machineOptions?.length && !backlogTask.machineOptions.includes(machine)) return;
        planTask(backlogTask, el.dataset.day, machine);
        return;
      }

      if(scheduledTask){
        if(scheduledTask.machineOptions?.length && !scheduledTask.machineOptions.includes(machine)) return;
        moveScheduledTask(
          scheduledTask.operationKey || scheduledTask.fp,
          scheduledTask.fromDay,
          scheduledTask.fromMachine,
          el.dataset.day,
          machine,
          null
        );
      }
    });
  });

  wrap.querySelectorAll(".planned-op").forEach(el=>{
    el.addEventListener("dragstart", e=>{
      const task = Object.values(state.schedule).flat().find(t =>
        makeOperationFingerprint(t) === el.dataset.fp &&
        String(t.plannedDay) === String(el.dataset.day) &&
        String(t.machine) === String(el.dataset.machine)
      );
      const payload = {
        fp: el.dataset.fp,
        operationKey: el.dataset.opkey || el.dataset.fp,
        fromDay: el.dataset.day,
        fromMachine: el.dataset.machine,
        index: Number(el.dataset.index || 0),
        machineOptions: task?.machineOptions || []
      };
      el.classList.add("dragging");
      e.dataTransfer.setData("application/scheduled-task", JSON.stringify(payload));
    });

    el.addEventListener("dragend", ()=>{
      el.classList.remove("dragging");
      el.classList.remove("over-before");
      el.classList.remove("over-after");
      clearDragPreview();
      renderMachines();
    });

    el.addEventListener("dragover", e=>{
      e.preventDefault();
      e.stopPropagation();
      const scheduledTask = readDraggedScheduledTask(e);
      if(!scheduledTask) return;
      const targetMachine = el.dataset.machine;
      const targetOptions = scheduledTask.machineOptions?.length ? scheduledTask.machineOptions : [];
      if(targetOptions.length && !targetOptions.includes(targetMachine)) return;
      const targetIndex = getDropTargetIndex(el, e);
      setDragPreview({
        targetDay: el.dataset.day,
        targetMachine: targetMachine,
        lines: buildPlacementPreview(scheduledTask.operationKey || scheduledTask.fp, el.dataset.day, targetMachine),
        targetIndex: targetIndex
      });
      renderMachines();
    });

    el.addEventListener("dragleave", ()=>{
      el.classList.remove("over-before");
      el.classList.remove("over-after");
    });

    el.addEventListener("drop", e=>{
      e.preventDefault();
      e.stopPropagation();
      const scheduledTask = readDraggedScheduledTask(e);
      if(!scheduledTask) return;

      const targetDay = el.dataset.day;
      const targetMachine = el.dataset.machine;
      const targetIndex = getDropTargetIndex(el, e);

      el.classList.remove("over-before");
      el.classList.remove("over-after");

      const targetOptions = scheduledTask.machineOptions?.length ? scheduledTask.machineOptions : [];
      if(targetOptions.length && !targetOptions.includes(targetMachine)) return;

      const sameLane = scheduledTask.fromDay === targetDay && scheduledTask.fromMachine === targetMachine;
      if(sameLane){
        reorderScheduledTask(targetDay, targetMachine, scheduledTask.operationKey || scheduledTask.fp, targetIndex);
      } else {
        moveScheduledTask(
          scheduledTask.operationKey || scheduledTask.fp,
          scheduledTask.fromDay,
          scheduledTask.fromMachine,
          targetDay,
          targetMachine,
          targetIndex
        );
      }
    });
  });

  wrap.querySelectorAll(".done-btn").forEach(btn=>{
    btn.onclick = ()=>{
      const fp = btn.dataset.fp;
      const task = Object.values(state.schedule).flat().find(t=>makeOperationFingerprint(t)===fp);
      if(task) markScheduledOperationDone(task);
    };
  });

  wrap.querySelectorAll(".return-btn").forEach(btn=>{
    btn.onclick = ()=>{
      const fp = btn.dataset.fp;
      const task = Object.values(state.schedule).flat().find(t=>makeOperationFingerprint(t)===fp);
      if(task) returnScheduledTaskToBacklog(task);
    };
  });

  wrap.querySelectorAll("[data-capacity-day]").forEach(input=>{
    input.addEventListener("change", e=>{
      setDayCapacity(e.target.dataset.capacityMachine, e.target.dataset.capacityDay, e.target.value);
    });
    input.addEventListener("click", e=>e.stopPropagation());
  });

  wrap.querySelectorAll("[data-off-day]").forEach(input=>{
    input.addEventListener("change", e=>{
      setDayOff(e.target.dataset.offMachine, e.target.dataset.offDay, e.target.checked);
    });
    input.addEventListener("click", e=>e.stopPropagation());
  });
}
function readDraggedTask(e){
  try{
    const raw = e.dataTransfer.getData("application/json");
    if(!raw) return null;
    return JSON.parse(raw);
  }catch(_){ return null; }
}
function escapeHtml(s){
  return String(s ?? "").replace(/[&<>"']/g, c=>({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c]));
}
function escapeAttr(s){ return escapeHtml(s); }
function render(){
  document.getElementById("searchInput").value = state.searchTerm;
  document.getElementById("sortBy").value = state.sortBy;
  renderMachineFilter();
  renderBacklog();
  renderMachines();
  saveState();
}



function initHeaderImport() {
  const importBtnHeader = document.getElementById("importButtonHeader");
  const fileInputHeader = document.getElementById("fileInputHeader");
  const importFileNameHeader = document.getElementById("importFileNameHeader");

  if (!importBtnHeader || !fileInputHeader) return;

  importBtnHeader.onclick = function () {
    fileInputHeader.click();
  };

  fileInputHeader.onchange = function (e) {
    const file = e.target && e.target.files && e.target.files[0] ? e.target.files[0] : null;
    if (importFileNameHeader) {
      importFileNameHeader.textContent = file ? file.name : "Vyber soubor pro automatický import";
    }
    if (file) {
      handleImport(file);
      fileInputHeader.value = "";
    }
  };
}

initHeaderImport();

document.getElementById("searchInput").addEventListener("input", e=>{ state.searchTerm = e.target.value; render(); });
document.getElementById("machineFilter").addEventListener("change", e=>{ state.machineFilter = e.target.value; render(); });
if(document.getElementById("sortBy")){
  document.getElementById("sortBy").addEventListener("change", e=>{ state.sortBy = e.target.value; render(); });
}
document.getElementById("sortBy").addEventListener("change", e=>{ state.sortBy = e.target.value; render(); });
document.getElementById("prevWeek").onclick = ()=>{ state.weekStart = addDays(state.weekStart,-7); render(); };
document.getElementById("nextWeek").onclick = ()=>{ state.weekStart = addDays(state.weekStart,7); render(); };
document.getElementById("todayWeek").onclick = ()=>{ state.weekStart = startOfWeek(new Date()); render(); };
document.getElementById("resetData").onclick = ()=>{ if(confirm("Opravdu smazat uložená data?")) resetAllData(); };

loadState();
[...new Set(Object.keys(state.schedule).map(k => k.split("_").slice(1).join("_")).filter(Boolean))].forEach(machineName=>{
  rebuildMachineTimeline(machineName);
});
render();
initCloud();
</script>
